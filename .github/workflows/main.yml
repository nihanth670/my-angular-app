name: Build and Deploy Angular to New ADLS Static Website

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull the code from your new repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Node environment
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Install project dependencies
      - name: Install Dependencies
        run: npm install

      # 4. Compile Angular Application (creates the dist folder)
      - name: Build Angular Project
        run: npm run build

      # 5. Upload the Angular compiled folder directly
      - name: Upload Compiled Files to Azure
        run: |
          az storage blob upload-batch \
            --account-name nihanthadlsaccount \
            --account-key "${{ secrets.AZURE_STORAGE_KEY }}" \
            --destination '$web' \
            --source ./dist/angular-16-crud
